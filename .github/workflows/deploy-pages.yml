name: Deploy Lab Slides to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare deployment
        run: |
          mkdir -p _site
          # Session 1 -> Wednesday deck (slides.html at root)
          cp -r Session_1_Train_SLM_from_Scratch/* _site/
          # Session 2 -> Saturday deck (embeddings.html at root, keep its resources image)
          cp Session_2_Language_Models_in_Depth/embeddings.html _site/
          # Deploy under a distinct name so it does not overwrite Session 1's resources.html
          cp Session_2_Language_Models_in_Depth/resources.html _site/embeddings-resources.html
          cp -r Session_2_Language_Models_in_Depth/resources/* _site/resources/
          cp README.md _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
